<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="robots" content="noindex"><title>TS2</title><style>body{background:#0d0d12;color:#e6edf3;font-family:system-ui;max-width:700px;margin:0 auto;padding:32px}button{background:#C8FF00;border:0;border-radius:10px;padding:12px 20px;font-weight:700;cursor:pointer}pre{background:#000;border:1px solid #2e2c42;border-radius:8px;padding:14px;white-space:pre-wrap;margin-top:14px}.ok{color:#7CFC00}.err{color:#ff5c5c}</style></head><body><h1 style="font-size:18px">Logos retry</h1><button id="run">Apply</button><pre id="log"></pre><script>const LG=[{"slug":"openai"},{"slug":"klaviyo"}];const log=document.getElementById('log');function L(m,c){const s=document.createElement('span');if(c)s.className=c;s.textContent=m+'\n';log.appendChild(s);}
function tk(){return (localStorage.getItem('pl_token')||'').trim();}function b64u(s){return btoa(unescape(encodeURIComponent(s)));}
function gh(p,o={}){return fetch('https://api.github.com/repos/cristinaperspective/perspectivesocial/'+p,{...o,headers:{'Authorization':'Bearer '+tk(),'Accept':'application/vnd.github+json',...(o.headers||{})}});}
async function gs(p){const r=await gh('contents/'+p+'?ref=main&t='+Date.now());return r.status===200?(await r.json()).sha:null;}
async function put(p,b,m){const sha=await gs(p);const body={message:m,content:b,branch:'main'};if(sha)body.sha=sha;const r=await gh('contents/'+p,{method:'PUT',body:JSON.stringify(body)});if(!r.ok)throw new Error(p+' '+r.status);}
async function getSvg(slug){const urls=['https://cdn.simpleicons.org/'+slug+'/ffffff','https://cdn.simpleicons.org/'+slug+'/white','https://unpkg.com/simple-icons@latest/icons/'+slug+'.svg'];for(const u of urls){try{const r=await fetch(u);if(r.ok){let t=await r.text();if(u.includes('unpkg')){t=t.replace('<svg ','<svg fill="#ffffff" ');}return t;}}catch(e){}await new Promise(z=>setTimeout(z,600));}return null;}
document.getElementById('run').onclick=async()=>{log.textContent='';if(!tk()){L('No token','err');return;}
 for(const l of LG){let svg=null;for(let a=0;a<3&&!svg;a++){svg=await getSvg(l.slug);if(!svg)await new Promise(z=>setTimeout(z,800));}
  if(!svg){L('  ! '+l.slug+' still failed','err');continue;}
  try{await put('images/tech/'+l.slug+'.svg',b64u(svg),'tech logo '+l.slug);L('  OK '+l.slug,'ok');}catch(e){L('  ! put '+l.slug+' '+e.message,'err');}}
 L('Done.','ok');};</script></body></html>
