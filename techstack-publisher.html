function tk(){return (localStorage.getItem('pl_token')||'').trim();}function b64u(s){return btoa(unescape(encodeURIComponent(s)));}
function gh(p,o={}){return fetch('https://api.github.com/repos/cristinaperspective/perspectivesocial/'+p,{...o,headers:{'Authorization':'Bearer '+tk(),'Accept':'application/vnd.github+json',...(o.headers||{})}});}
async function gs(p){const r=await gh('contents/'+p+'?ref=main&t='+Date.now());return r.status===200?(await r.json()).sha:null;}
async function put(p,b,m){const sha=await gs(p);const body={message:m,content:b,branch:'main'};if(sha)body.sha=sha;const r=await gh('contents/'+p,{method:'PUT',body:JSON.stringify(body)});if(!r.ok)throw new Error(p+' '+r.status);}
document.getElementById('run').onclick=async()=>{log.textContent='';if(!tk()){L('No token','err');return;}
 for(const [slug,svg] of ITEMS){try{await put('images/tech/'+slug+'.svg',b64u(svg),'tech logo '+slug);L('OK '+slug,'ok');}catch(e){L('! '+slug+' '+e.message,'err');}}L('Done.','ok');};</script></body></html>
