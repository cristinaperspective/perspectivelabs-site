<!DOCTYPE html><html><head><meta charset="utf-8"><title>Events press marquee</title>
<style>body{font-family:system-ui;background:#111;color:#eee;padding:30px}button{background:#FF3D1F;color:#fff;border:0;padding:14px 28px;font-size:16px;border-radius:6px;cursor:pointer}#log{margin-top:20px;white-space:pre-wrap;font-family:monospace;font-size:12px}</style>
</head><body><h2>Events: Get-featured-in marquee + international press</h2><button id="go">Deploy</button><div id="log"></div>
<script>
var OWNER='cristinaperspective',REPO='perspectiveevents-site',BRANCH='main';
function log(m){document.getElementById('log').textContent+=m+"\n";}
function tok(){return localStorage.getItem('pl_token')||'';}
function gh(p,o){o=o||{};return fetch('https://api.github.com/repos/'+OWNER+'/'+REPO+'/'+p,{method:o.method||'GET',headers:{'Authorization':'token '+tok(),'Accept':'application/vnd.github+json'},body:o.body||undefined});}
function b64u(s){return btoa(unescape(encodeURIComponent(s)));}
function ub64(b){return decodeURIComponent(escape(atob(b.replace(/\n/g,''))));}
async function getSha(p){var r=await gh('contents/'+p+'?ref='+BRANCH+'&t='+Date.now());if(r.status===200)return (await r.json()).sha;return null;}
var NAMES=['The Irish Times','Irish Independent','Business Post','Irish Examiner','Irish Tech News','Forbes','Entrepreneur','Business Insider','EU-Startups','Tech.eu','Startups Magazine','BizBash','Thrive Global'];
function spans(){return NAMES.map(function(n){return '<span class="press-name">'+n+'</span>';}).join('');}
var MARQ='<div class="press-marq reveal in"><div class="press-track">'+spans()+spans()+'</div></div>';
var CSS='\n.press-marq{overflow:hidden;margin:0 auto;-webkit-mask-image:linear-gradient(90deg,transparent,#000 7%,#000 93%,transparent);mask-image:linear-gradient(90deg,transparent,#000 7%,#000 93%,transparent)}\n.press-track{display:flex;gap:clamp(28px,5vw,56px);width:max-content;animation:pressMarq 60s linear infinite;align-items:center}\n.press-track:hover{animation-play-state:paused}\n.press-track .press-name{white-space:nowrap}\n@keyframes pressMarq{from{transform:translateX(0)}to{transform:translateX(-50%)}}\n';
document.getElementById('go').onclick=async function(){this.disabled=true;try{
 if(!tok()){log('no token');return;}
 var r=await gh('contents/index.html?ref='+BRANCH+'&t='+Date.now());var j=await r.json();var sha=j.sha;var html=ub64(j.content);
 if(html.indexOf('press-track')>-1){log('already a marquee');return;}
 if(!/<div class="press-row[^"]*">[\s\S]*?<\/div>/.test(html)){log('WARN: press-row not found, aborting');return;}
 html=html.replace(/<div class="press-row[^"]*">[\s\S]*?<\/div>/, MARQ);
 if(html.indexOf('.press-track')<0)html=html.replace('</style>',CSS+'</style>');
 for(var a=0;a<3;a++){var pr=await gh('contents/index.html',{method:'PUT',body:JSON.stringify({message:'Get-featured-in marquee + international press',content:b64u(html),branch:BRANCH,sha:sha})});if(pr.ok){log('OK index.html');break;}if(pr.status===409&&a<2){var g=await gh('contents/index.html?ref='+BRANCH+'&t='+Date.now());var gj=await g.json();sha=gj.sha;html=ub64(gj.content);if(html.indexOf('press-track')>-1){log('already done');return;}html=html.replace(/<div class="press-row[^"]*">[\s\S]*?<\/div>/, MARQ);if(html.indexOf('.press-track')<0)html=html.replace('</style>',CSS+'</style>');continue;}log('ERR '+pr.status+' '+(await pr.text()).slice(0,140));break;}
 log('Done.');
}catch(e){log('ERROR '+e.message);}};
</script></body></html>
