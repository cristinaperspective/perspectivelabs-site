function L(m,c){const s=document.createElement('span');if(c)s.className=c;s.textContent=m+'\n';log.appendChild(s);log.scrollTop=log.scrollHeight;}
function tk(){return (localStorage.getItem('pl_token')||'').trim();}
function gh(repo,path,o={}){return fetch('https://api.github.com/repos/cristinaperspective/'+repo+'/'+path,{...o,headers:{'Authorization':'Bearer '+tk(),'Accept':'application/vnd.github+json',...(o.headers||{})}});}
async function getSha(repo,path){const r=await gh(repo,'contents/'+path+'?ref=main&t='+Date.now());return r.status===200?(await r.json()).sha:null;}
async function put(repo,path,b64,msg){const sha=await getSha(repo,path);const body={message:msg,content:b64,branch:'main'};if(sha)body.sha=sha;const r=await gh(repo,'contents/'+path,{method:'PUT',body:JSON.stringify(body)});if(!r.ok)throw new Error(path+' '+r.status+' '+(await r.text()).slice(0,100));}
async function run(){$('run').disabled=true;log.textContent='';if(!tk()){L('No token','err');return;}
 try{
  for(const l of P.listings){await put(l.repo,'blog/index.html',l.b64,'Theme: listing '+l.repo);L('✓ '+l.repo+' listing','ok');}
  for(const p of P.posts){await put(p.repo,'blog/'+p.slug+'/index.html',p.b64,'Theme: post '+p.slug);L('✓ '+p.repo+'/'+p.slug,'ok');}
  for(const a of P.blogadmins){await put(a.repo,'blog-admin.html',a.b64,'Theme: blog-admin '+a.repo);L('✓ '+a.repo+' blog-admin','ok');}
  L('\nDone. Live in ~1-2 min.','ok');
 }catch(e){L('! '+e.message,'err');}$('run').disabled=false;
