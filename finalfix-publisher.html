function b64utf8(s){return btoa(unescape(encodeURIComponent(s)));}
function gh(repo,path,o={}){return fetch('https://api.github.com/repos/cristinaperspective/'+repo+'/'+path,{...o,headers:{'Authorization':'Bearer '+tk(),'Accept':'application/vnd.github+json',...(o.headers||{})}});}
async function getJson(repo,path){const r=await gh(repo,'contents/'+path+'?ref=main&t='+Date.now());if(r.status!==200)return{sha:null,data:null};const j=await r.json();return{sha:j.sha,data:JSON.parse(decodeURIComponent(escape(atob(j.content.replace(/\s/g,'')))))};}
async function getSha(repo,path){const r=await gh(repo,'contents/'+path+'?ref=main&t='+Date.now());return r.status===200?(await r.json()).sha:null;}
async function put(repo,path,b64,msg,sha){if(sha===undefined)sha=await getSha(repo,path);const body={message:msg,content:b64,branch:'main'};if(sha)body.sha=sha;const r=await gh(repo,'contents/'+path,{method:'PUT',body:JSON.stringify(body)});if(!r.ok)throw new Error(path+' '+r.status+' '+(await r.text()).slice(0,100));}
async function run(){$('run').disabled=true;log.textContent='';if(!tk()){L('No token','err');return;}
 try{
  for(const c of P.recovers){await put(c.repo,'blog/'+c.slug+'/cover.jpg',c.coverB64,'Dark graphic cover '+c.slug);L('✓ recover '+c.slug,'ok');}
  const byRepo={};P.posts.forEach(p=>{(byRepo[p.repo]=byRepo[p.repo]||[]).push(p);});
  for(const repo of Object.keys(byRepo)){L('── '+repo,'dim');let pj=await getJson(repo,'blog/posts.json');let posts=Array.isArray(pj.data)?pj.data:[];
   for(const p of byRepo[repo]){await put(repo,'blog/'+p.slug+'/index.html',p.postB64,'Versioned cover '+p.slug);const i=posts.findIndex(x=>x.slug===p.slug);if(i>=0)posts[i].cover=p.cover;L('  ✓ '+p.slug,'ok');}
   await put(repo,'blog/posts.json',b64utf8(JSON.stringify(posts,null,2)),'Versioned covers in posts.json',pj.sha);L('  ✓ posts.json','ok');}
  L('\nDone. Live in ~1-2 min.','ok');
 }catch(e){L('! '+e.message,'err');}
 $('run').disabled=false;
}
$('run').onclick=run;(function(){if(tk()){$('tok').innerHTML='<span class="ok">✓ Token.</span>';$('run').disabled=false;}else $('tok').textContent='No token';})();
</script></body></html>
