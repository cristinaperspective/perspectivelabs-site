function log(m){document.getElementById('log').textContent+=m+"\n";}
function tok(){return localStorage.getItem('pl_token')||'';}
function gh(p,o){o=o||{};return fetch('https://api.github.com/repos/'+OWNER+'/'+REPO+'/'+p,{method:o.method||'GET',headers:{'Authorization':'token '+tok(),'Accept':'application/vnd.github+json'},body:o.body||undefined});}
async function getSha(p){var r=await gh('contents/'+p+'?ref='+BRANCH+'&t='+Date.now());if(r.status===200)return (await r.json()).sha;return null;}
async function put(p,c,msg){for(var a=0;a<3;a++){var sha=await getSha(p);var b={message:msg,content:c,branch:BRANCH};if(sha)b.sha=sha;var r=await gh('contents/'+p,{method:'PUT',body:JSON.stringify(b)});if(r.ok){log('OK '+p);return;}if(r.status===409&&a<2){await new Promise(s=>setTimeout(s,600));continue;}throw new Error(p+': '+r.status+' '+(await r.text()).slice(0,140));}}
document.getElementById('go').onclick=async function(){this.disabled=true;try{if(!tok()){log('no token');return;}await put('images/tech/klaviyo.svg',KL,'Klaviyo serif wordmark + flag');await put('editor.html',ED,'Editor: add Adjust (reframe/resize/realign) tool');log('Done.');}catch(e){log('ERROR '+e.message);}};
</script></body></html>
