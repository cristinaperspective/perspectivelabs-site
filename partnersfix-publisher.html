function log(m){document.getElementById('log').textContent+=m+"\n";}
function tok(){return localStorage.getItem('pl_token')||'';}
function gh(p,o){o=o||{};return fetch('https://api.github.com/repos/'+OWNER+'/'+REPO+'/'+p,{method:o.method||'GET',headers:{'Authorization':'token '+tok(),'Accept':'application/vnd.github+json'},body:o.body||undefined});}
function b64u(s){return btoa(unescape(encodeURIComponent(s)));}
function ub64(b){return decodeURIComponent(escape(atob(b.replace(/\n/g,''))));}
async function getSha(p){var r=await gh('contents/'+p+'?ref='+BRANCH+'&t='+Date.now());if(r.status===200)return (await r.json()).sha;return null;}
async function put(p,c,msg){for(var a=0;a<3;a++){var sha=await getSha(p);var b={message:msg,content:c,branch:BRANCH};if(sha)b.sha=sha;var r=await gh('contents/'+p,{method:'PUT',body:JSON.stringify(b)});if(r.ok){log('OK '+p);return;}if(r.status===409&&a<2){await new Promise(s=>setTimeout(s,400));continue;}throw new Error(p+': '+r.status+' '+(await r.text()).slice(0,120));}}

var FNCSS='\n.footer-nav{display:flex;gap:22px;flex-wrap:wrap}.footer-nav a{font-size:12px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:rgba(245,240,236,0.7);transition:color .2s}.footer-nav a:hover{color:var(--orange)}\n';

async function fixNav(file){
 var r=await gh('contents/'+file+'?ref='+BRANCH+'&t='+Date.now());var j=await r.json();var sha=j.sha;var html=ub64(j.content);
 html=html.replace('<a href="/strategic-partners.html">Partners</a>\n','').replace('<a href="/careers.html">Careers</a>\n','').replace('<a href="/strategic-partners.html">Partners</a>','').replace('<a href="/careers.html">Careers</a>','');

   html=html.replace('<span class="footer-tag">SMM &middot; Content &middot; Digital PR &middot; Newsletters &middot; Podcasts</span>',FNAV);

 }

}
