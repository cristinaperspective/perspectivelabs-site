<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="robots" content="noindex"><title>FF4</title><style>body{background:#0d0d12;color:#e6edf3;font-family:system-ui;max-width:700px;margin:0 auto;padding:32px}button{background:#C8FF00;border:0;border-radius:10px;padding:12px 20px;font-weight:700;cursor:pointer}pre{background:#000;border:1px solid #2e2c42;border-radius:8px;padding:14px;white-space:pre-wrap;margin-top:14px}.ok{color:#7CFC00}.err{color:#ff5c5c}</style></head><body><h1 style="font-size:18px">Restore 70+ & mobile hero</h1><button id="run">Apply</button><pre id="log"></pre><script>const P=[["<div class=\"stat\" style=\"display:flex;align-items:center;justify-content:center;\"><div class=\"num\" style=\"font-size:clamp(28px,3.6vw,48px);line-height:1.05;text-transform:uppercase;\">Dedicated Team</div></div>","<div class=\"stat\"><div class=\"num\">70+</div><div class=\"lbl\">Clients</div></div>\n<div class=\"stat\" style=\"display:flex;align-items:center;justify-content:center;\"><div class=\"num\" style=\"font-size:clamp(28px,3.6vw,48px);line-height:1.05;text-transform:uppercase;\">Dedicated Team</div></div>"],["@media(max-width:680px){\n.nav-links{position:fixed","@media(max-width:680px){\n.hero h1{font-size:clamp(33px,9.5vw,50px);}\n.nav-links{position:fixed"]];const log=document.getElementById('log');function L(m,c){const s=document.createElement('span');if(c)s.className=c;s.textContent=m+'\n';log.appendChild(s);}
function tk(){return (localStorage.getItem('pl_token')||'').trim();}
function gh(p,o={}){return fetch('https://api.github.com/repos/cristinaperspective/perspectivesocial/'+p,{...o,headers:{'Authorization':'Bearer '+tk(),'Accept':'application/vnd.github+json',...(o.headers||{})}});}
document.getElementById('run').onclick=async()=>{log.textContent='';if(!tk()){L('No token','err');return;}
 const r=await gh('contents/index.html?ref=main&t='+Date.now());const j=await r.json();let h=decodeURIComponent(escape(atob(j.content.replace(/\s/g,''))));let miss=0;
 const has70=h.indexOf('70+</div><div class="lbl">Clients')>-1;
 P.forEach((p,i)=>{if(i===0&&has70){L('  skip 70 (present)');return;}if(h.indexOf(p[0])>-1){h=h.replace(p[0],p[1]);L('  OK '+(i+1),'ok');}else{L('  MISS '+(i+1),'err');miss++;}});
 if(miss>0){L('abort','err');return;}
 const put=await gh('contents/index.html',{method:'PUT',body:JSON.stringify({message:'Facts restore 70+ & mobile hero size',content:btoa(unescape(encodeURIComponent(h))),branch:'main',sha:j.sha})});
 L('PUT '+put.status+(put.ok?' Done':' FAIL'),put.ok?'ok':'err');};</script></body></html>
