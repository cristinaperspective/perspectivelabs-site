<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="robots" content="noindex"><title>FF5</title><style>body{background:#0d0d12;color:#e6edf3;font-family:system-ui;max-width:700px;margin:0 auto;padding:32px}button{background:#C8FF00;border:0;border-radius:10px;padding:12px 20px;font-weight:700;cursor:pointer}pre{background:#000;border:1px solid #2e2c42;border-radius:8px;padding:14px;white-space:pre-wrap;margin-top:14px}.ok{color:#7CFC00}.err{color:#ff5c5c}</style></head><body><h1 style="font-size:18px">FF5: 70+ & mobile hero</h1><button id="run">Apply</button><pre id="log"></pre><script>const P1F="<div class=\"stat\" style=\"display:flex;align-items:center;justify-content:center;\"><div class=\"num\" style=\"font-size:clamp(28px,3.6vw,48px);line-height:1.05;text-transform:uppercase;\">Dedicated Team</div></div>",P1R="<div class=\"stat\"><div class=\"num\">70+</div><div class=\"lbl\">Clients</div></div>\n<div class=\"stat\" style=\"display:flex;align-items:center;justify-content:center;\"><div class=\"num\" style=\"font-size:clamp(28px,3.6vw,48px);line-height:1.05;text-transform:uppercase;\">Dedicated Team</div></div>",P2F="@media(max-width:680px){",P2R="@media(max-width:680px){\n.hero h1{font-size:clamp(33px,9.5vw,50px);}";
const log=document.getElementById('log');function L(m,c){const s=document.createElement('span');if(c)s.className=c;s.textContent=m+'\n';log.appendChild(s);}
function tk(){return (localStorage.getItem('pl_token')||'').trim();}
function gh(p,o={}){return fetch('https://api.github.com/repos/cristinaperspective/perspectivesocial/'+p,{...o,headers:{'Authorization':'Bearer '+tk(),'Accept':'application/vnd.github+json',...(o.headers||{})}});}
document.getElementById('run').onclick=async()=>{log.textContent='';if(!tk()){L('No token','err');return;}
 const r=await gh('contents/index.html?ref=main&t='+Date.now());const j=await r.json();let h=decodeURIComponent(escape(atob(j.content.replace(/\s/g,''))));let changed=0;
 if(h.indexOf('70+</div><div class="lbl">Clients')>-1){L('70+ present, skip');}else if(h.indexOf(P1F)>-1){h=h.replace(P1F,P1R);changed++;L('OK restored 70+','ok');}else L('MISS 70+ (Dedicated Team stat not found)','err');
 if(h.indexOf('.hero h1{font-size:clamp(33px')>-1){L('mobile hero present, skip');}else if(h.indexOf(P2F)>-1){h=h.replace(P2F,P2R);changed++;L('OK mobile hero','ok');}else L('MISS mobile media','err');
 if(!changed){L('nothing to do','err');return;}
 const put=await gh('contents/index.html',{method:'PUT',body:JSON.stringify({message:'Facts 70+ & mobile hero size',content:btoa(unescape(encodeURIComponent(h))),branch:'main',sha:j.sha})});
 L('PUT '+put.status+(put.ok?' Done':' FAIL'),put.ok?'ok':'err');};</script></body></html>
