function log(m){document.getElementById('log').textContent+=m+"\n";}
function tok(){return localStorage.getItem('pl_token')||'';}
function gh(p,o){o=o||{};return fetch('https://api.github.com/repos/'+OWNER+'/'+REPO+'/'+p,{method:o.method||'GET',headers:{'Authorization':'token '+tok(),'Accept':'application/vnd.github+json'},body:o.body||undefined});}
function b64u(s){return btoa(unescape(encodeURIComponent(s)));}
function ub64(b){return decodeURIComponent(escape(atob(b.replace(/\n/g,''))));}
async function getSha(p){var r=await gh('contents/'+p+'?ref='+BRANCH+'&t='+Date.now());if(r.status===200)return (await r.json()).sha;return null;}
async function put(p,c,msg){for(var a=0;a<3;a++){var sha=await getSha(p);var b={message:msg,content:c,branch:BRANCH};if(sha)b.sha=sha;var r=await gh('contents/'+p,{method:'PUT',body:JSON.stringify(b)});if(r.ok){log('OK '+p);return;}if(r.status===409&&a<2){await new Promise(s=>setTimeout(s,500));continue;}throw new Error(p+': '+r.status+' '+(await r.text()).slice(0,140));}}
async function fixIndex(){
 var r=await gh('contents/index.html?ref='+BRANCH+'&t='+Date.now());var j=await r.json();var sha=j.sha;var html=ub64(j.content);
 html=html.replace('if(s.hero_subtitle){document.getElementById(\'heroSub\').textContent=s.hero_subtitle;}','/* hero subtitle stays inline-editable */');
 html=html.replace("document.getElementById('workGrid').innerHTML=html;","if(!document.getElementById('workGrid').children.length){document.getElementById('workGrid').innerHTML=html;}");
 for(var a=0;a<3;a++){var pr=await gh('contents/index.html',{method:'PUT',body:JSON.stringify({message:'Make hero subtitle + work cards inline-edit persistent',content:b64u(html),branch:BRANCH,sha:sha})});if(pr.ok){log('OK index.html');return;}if(pr.status===409&&a<2){var g=await gh('contents/index.html?ref='+BRANCH+'&t='+Date.now());var gj=await g.json();sha=gj.sha;continue;}throw new Error('index '+pr.status);}
}
document.getElementById('go').onclick=async function(){this.disabled=true;try{if(!tok()){log('no token');return;}await put('editor.html',ED,'Editor: upload logos in Lists');await fixIndex();log('Done.');}catch(e){log('ERROR '+e.message);}};
</script></body></html>
