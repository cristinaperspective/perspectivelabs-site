const $=id=>document.getElementById(id);const log=$('log');
function L(m,c){const s=document.createElement('span');if(c)s.className=c;s.textContent=m+'\n';log.appendChild(s);log.scrollTop=log.scrollHeight;}
function token(){return (localStorage.getItem('pl_token')||'').trim();}
function b64utf8(s){return btoa(unescape(encodeURIComponent(s)));}
function gh(repo,path,opts={}){return fetch('https://api.github.com/repos/cristinaperspective/'+repo+'/'+path,{...opts,headers:{'Authorization':'Bearer '+token(),'Accept':'application/vnd.github+json',...(opts.headers||{})}});}
async function getJson(repo,path){const r=await gh(repo,'contents/'+path+'?ref=main&t='+Date.now());if(r.status!==200)return{sha:null,data:null};const j=await r.json();return{sha:j.sha,data:JSON.parse(decodeURIComponent(escape(atob(j.content.replace(/\s/g,'')))))};}
async function getSha(repo,path){const r=await gh(repo,'contents/'+path+'?ref=main&t='+Date.now());return r.status===200?(await r.json()).sha:null;}
async function put(repo,path,b64,msg,sha){const body={message:msg,content:b64,branch:'main'};if(sha)body.sha=sha;const r=await gh(repo,'contents/'+path,{method:'PUT',body:JSON.stringify(body)});if(!r.ok)throw new Error(path+' '+r.status+' '+(await r.text()).slice(0,120));}
function sitemap(site,posts){const urls=[site+'/',site+'/blog/'].concat(posts.map(p=>site+'/blog/'+p.slug+'/'));return '<?xml version="1.0" encoding="UTF-8"?>\n<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\n'+urls.map(u=>'  <url><loc>'+u+'</loc></url>').join('\n')+'\n</urlset>';}
async function run(){
 $('run').disabled=true;log.textContent='';
 if(!token()){L('No token found.','err');$('run').disabled=false;return;}
 const byRepo={};POSTS.forEach(p=>{(byRepo[p.repo]=byRepo[p.repo]||[]).push(p);});
 for(const repo of Object.keys(byRepo)){
  const group=byRepo[repo];const site=group[0].site;
  L('── '+repo,'dim');
  try{
   let pj=await getJson(repo,'blog/posts.json');let posts=Array.isArray(pj.data)?pj.data:[];
   for(const p of group){
     const sha=await getSha(repo,'blog/'+p.slug+'/index.html');
     await put(repo,'blog/'+p.slug+'/index.html',p.b64,'Publish post '+p.slug,sha);
     L('  ✓ '+p.slug,'ok');
     posts=posts.filter(x=>x.slug!==p.slug);
     posts.unshift({slug:p.slug,title:p.title,desc:p.desc,date:p.date,cover:''});
   }
   await put(repo,'blog/posts.json',b64utf8(JSON.stringify(posts,null,2)),'Update posts.json',pj.sha);L('  ✓ posts.json','ok');
   await put(repo,'sitemap.xml',b64utf8(sitemap(site,posts)),'Update sitemap',await getSha(repo,'sitemap.xml'));L('  ✓ sitemap.xml','ok');
  }catch(e){L('  ! '+e.message,'err');}
 }
 L('\nDone. Live in ~1-2 min.','ok');$('run').disabled=false;
}
$('run').onclick=run;
(function(){if(token()){$('tok').innerHTML='<span class="ok">✓ Token detected.</span> Ready.';$('run').disabled=false;}else{$('tok').innerHTML='<span class="err">No token on this origin.</span>';}})();
</script></body></html>
