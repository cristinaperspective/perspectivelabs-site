const $=id=>document.getElementById(id);
const log=$('log');
function L(m,c){const s=document.createElement('span');if(c)s.className=c;s.textContent=m+'\n';log.appendChild(s);log.scrollTop=log.scrollHeight;}
function token(){return (localStorage.getItem('pl_token')||$('tokInput').value||'').trim();}
function b64utf8(s){return btoa(unescape(encodeURIComponent(s)));}
function gh(owner,repo,path,opts={}){return fetch('https://api.github.com/repos/'+owner+'/'+repo+'/'+path,{...opts,headers:{'Authorization':'Bearer '+token(),'Accept':'application/vnd.github+json',...(opts.headers||{})}});}
async function getSha(owner,repo,path){const r=await gh(owner,repo,'contents/'+path+'?ref=main&t='+Date.now());if(r.status===200)return (await r.json()).sha;return null;}
async function getFile(owner,repo,path){const r=await gh(owner,repo,'contents/'+path+'?ref=main&t='+Date.now());if(r.status!==200)return null;const j=await r.json();return{sha:j.sha,text:decodeURIComponent(escape(atob(j.content.replace(/\s/g,''))))};}
async function put(owner,repo,path,b64,msg,sha){const body={message:msg,content:b64,branch:'main'};if(sha)body.sha=sha;const r=await gh(owner,repo,'contents/'+path,{method:'PUT',body:JSON.stringify(body)});if(!r.ok)throw new Error(path+' '+r.status+' '+(await r.text()).slice(0,100));}

function seoBlock(s){const D='https://'+s.domain;const t=s.ogtitle,de=s.desc;
 return [
 '<link rel="canonical" href="'+D+'/">',
 '<meta name="referrer" content="strict-origin-when-cross-origin">',
 '<meta name="theme-color" content="'+s.theme+'">',
 '<meta property="og:type" content="website">',
 '<meta property="og:site_name" content="'+s.name+'">',
 '<meta property="og:title" content="'+t+'">',
 '<meta property="og:description" content="'+de+'">',
 '<meta property="og:url" content="'+D+'/">',
 '<meta property="og:image" content="'+D+'/og.png">',
 '<meta property="og:image:width" content="1200"><meta property="og:image:height" content="630">',
 '<meta name="twitter:card" content="summary_large_image">',
 '<meta name="twitter:title" content="'+t+'">',
 '<meta name="twitter:description" content="'+de+'">',
 '<meta name="twitter:image" content="'+D+'/og.png">',
 '<link rel="icon" type="image/svg+xml" href="/favicon.svg">',
 '<script type="application/ld+json">'+JSON.stringify(s.jsonld)+'<\/script>'
 ].join('\n');
}
function transform(h,s){
 // strip managed tags for idempotency
 h=h.replace(/[ \t]*<link rel="canonical"[^>]*>\n?/gi,'');
 h=h.replace(/[ \t]*<meta name="referrer"[^>]*>\n?/gi,'');
 h=h.replace(/[ \t]*<meta name="theme-color"[^>]*>\n?/gi,'');
 h=h.replace(/[ \t]*<meta property="og:[^"]*"[^>]*>\n?/gi,'');
 h=h.replace(/[ \t]*<meta name="twitter:[^"]*"[^>]*>\n?/gi,'');
 h=h.replace(/[ \t]*<link rel="icon"[^>]*>\n?/gi,'');
 h=h.replace(/[ \t]*<script type="application\/ld\+json">[\s\S]*?<\/script>\n?/gi,'');
 // description
 const dmeta='<meta name="description" content="'+s.desc+'">';
 if(/<meta\s+name=["']description["'][^>]*>/i.test(h)){h=h.replace(/<meta\s+name=["']description["'][^>]*>/i,dmeta);}
 else{h=h.replace(/<\/title>/i,'</title>\n'+dmeta);}
 // title force
 if(s.titleForce){h=h.replace(/<title>[\s\S]*?<\/title>/i,'<title>'+s.titleForce+'</title>');}
 // seo block before </head>
 h=h.replace(/<\/head>/i,seoBlock(s)+'\n</head>');
 // nav blog link
 if(s.nav && h.indexOf(s.nav.find)>-1 && !/href="\/blog\/?"/.test(h)){h=h.replace(s.nav.find,s.nav.repl);}
 // hidden h1 (circle)
 if(s.hiddenH1 && !/<h1[\s>]/i.test(h)){h=h.replace(/(<body[^>]*>)/i,'$1\n'+s.hiddenH1);}
 return h;
}
async function doSite(s){
 L('── '+s.name+' ('+s.domain+')','dim');
 const owner='cristinaperspective';
 const file=await getFile(owner,s.repo,'index.html');
 if(!file){L('  ! could not read index.html','err');return;}
 const out=transform(file.text,s);
 if(out!==file.text){await put(owner,s.repo,'index.html',b64utf8(out),'SEO: OG/Twitter/canonical/JSON-LD/nav',file.sha);L('  ✓ index.html patched','ok');}
 else{L('  · index.html already current','dim');}
 // og.png
 await put(owner,s.repo,'og.png',s.ogB64,'Add OG share image',await getSha(owner,s.repo,'og.png'));L('  ✓ og.png','ok');
 // favicon.svg
 await put(owner,s.repo,'favicon.svg',b64utf8(s.favicon),'Add favicon',await getSha(owner,s.repo,'favicon.svg'));L('  ✓ favicon.svg','ok');
 // robots.txt
 const robots='User-agent: *\nAllow: /\nDisallow: /editor.html\nDisallow: /blog-admin.html\nDisallow: /optimizer.html\n\nSitemap: https://'+s.domain+'/sitemap.xml\n';
 await put(owner,s.repo,'robots.txt',b64utf8(robots),'Add robots.txt',await getSha(owner,s.repo,'robots.txt'));L('  ✓ robots.txt','ok');
}
$('run').onclick=async()=>{
 $('run').disabled=true;log.textContent='';
 if(!token()){L('No token found. Paste it above and retry.','err');$('tokInput').style.display='block';$('run').disabled=false;return;}
 for(const s of SITES){try{await doSite(s);}catch(e){L('  ! '+e.message,'err');}}
 L('\nDone. GitHub Pages will rebuild each site in ~1 min.','ok');
 $('run').disabled=false;
};
(function(){const t=localStorage.getItem('pl_token');if(t){$('tokStatus').innerHTML='<span class="ok">✓ Token detected on this origin.</span> Ready.';$('run').disabled=false;}else{$('tokStatus').innerHTML='<span class="err">No token on this origin.</span> Paste below.';$('tokInput').style.display='block';$('run').disabled=false;}})();
