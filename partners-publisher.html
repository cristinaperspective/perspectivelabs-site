function log(m){document.getElementById('log').textContent+=m+"\n";}
function tok(){return localStorage.getItem('pl_token')||'';}
function gh(path,opt){opt=opt||{};return fetch('https://api.github.com/repos/'+OWNER+'/'+REPO+'/'+path,{method:opt.method||'GET',headers:{'Authorization':'token '+tok(),'Accept':'application/vnd.github+json'},body:opt.body||undefined});}
async function getSha(p){var r=await gh('contents/'+p+'?ref='+BRANCH+'&t='+Date.now());if(r.status===200)return (await r.json()).sha;return null;}
async function put(p,b64,msg){for(var a=0;a<3;a++){var sha=await getSha(p);var body={message:msg,content:b64,branch:BRANCH};if(sha)body.sha=sha;var r=await gh('contents/'+p,{method:'PUT',body:JSON.stringify(body)});if(r.ok){log('OK '+p);return;}if(r.status===409&&a<2){await new Promise(function(s){setTimeout(s,600);});continue;}throw new Error(p+': '+r.status+' '+(await r.text()).slice(0,140));}}
function b64ToUtf8(b){return decodeURIComponent(escape(atob(b.replace(/\n/g,''))));}
function utf8ToB64(s){return btoa(unescape(encodeURIComponent(s)));}
async function editIndex(){
 var r=await gh('contents/index.html?ref='+BRANCH+'&t='+Date.now());
 var j=await r.json();var sha=j.sha;var html=b64ToUtf8(j.content);
 if(html.indexOf('strategic-partners.html')>-1){log('index.html already has Partners link — skip');return;}
 var needle='<a href="/blog/">Blog</a>';
 if(html.indexOf(needle)<0){log('WARN: blog nav link not found, inserting before Contact');needle='<a href="#contact">Contact</a>';}
 html=html.replace(needle,'<a href="/strategic-partners.html">Partners</a>\n'+needle);
 var nb=utf8ToB64(html);
 for(var a=0;a<3;a++){var body={message:'Add Partners nav link',content:nb,branch:BRANCH,sha:sha};var pr=await gh('contents/index.html',{method:'PUT',body:JSON.stringify(body)});if(pr.ok){log('OK index.html nav link');return;}if(pr.status===409&&a<2){var g=await gh('contents/index.html?ref='+BRANCH+'&t='+Date.now());var gj=await g.json();sha=gj.sha;html=b64ToUtf8(gj.content);if(html.indexOf('strategic-partners.html')>-1){log('index already updated');return;}html=html.replace(needle,'<a href="/strategic-partners.html">Partners</a>\n'+needle);nb=utf8ToB64(html);continue;}throw new Error('index.html: '+pr.status+' '+(await pr.text()).slice(0,140));}
}
document.getElementById('go').onclick=async function(){
 this.disabled=true;
 try{
  if(!tok()){log('No pl_token in localStorage on this origin.');return;}
  await put('strategic-partners.html',SP_B64,'Add Strategic Partners page');
  await put('data/partners.json',PJ_B64,'Add strategic partners data');
  await editIndex();
  log('Done.');
 }catch(e){log('ERROR '+e.message);}
};
