function log(m){document.getElementById('log').textContent+=m+"\n";}
function tok(){return localStorage.getItem('pl_token')||'';}
function gh(p,o){o=o||{};return fetch('https://api.github.com/repos/'+OWNER+'/'+REPO+'/'+p,{method:o.method||'GET',headers:{'Authorization':'token '+tok(),'Accept':'application/vnd.github+json'},body:o.body||undefined});}
function b64u(s){return btoa(unescape(encodeURIComponent(s)));}
function ub64(b){return decodeURIComponent(escape(atob(b.replace(/\n/g,''))));}
async function getSha(p){var r=await gh('contents/'+p+'?ref='+BRANCH+'&t='+Date.now());if(r.status===200)return (await r.json()).sha;return null;}
async function put(p,c,msg){for(var a=0;a<3;a++){var sha=await getSha(p);var b={message:msg,content:c,branch:BRANCH};if(sha)b.sha=sha;var r=await gh('contents/'+p,{method:'PUT',body:JSON.stringify(b)});if(r.ok){log('OK '+p);return;}if(r.status===409&&a<2){await new Promise(s=>setTimeout(s,500));continue;}throw new Error(p+': '+r.status+' '+(await r.text()).slice(0,120));}}
var GCSS='\n.bts{background:var(--off-white);padding:90px 0 96px}\n.bts-head{margin-bottom:40px}\n.bts-gallery{display:flex;gap:18px;overflow-x:auto;scroll-snap-type:x mandatory;padding:0 32px 16px;-webkit-overflow-scrolling:touch}\n.bts-gallery::-webkit-scrollbar{height:8px}.bts-gallery::-webkit-scrollbar-thumb{background:rgba(22,26,23,.2);border-radius:4px}\n.bts-tile{flex:0 0 auto;width:clamp(220px,26vw,300px);aspect-ratio:4/5;border-radius:10px;overflow:hidden;scroll-snap-align:start;background:var(--light-sage);display:block}\n.bts-tile img{width:100%;height:100%;object-fit:cover}\n';
function tiles(){var s='';for(var i=1;i<=8;i++){s+='<a class="bts-tile"><img src="images/team/shot-'+i+'.svg" alt="Perspective Social behind the scenes"></a>\n';}return s;}
var SECTION='<section class="bts" id="behind">\n<div class="container">\n<div class="bts-head"><p class="eyebrow">Behind the scenes</p><h2 class="section-title">THE TEAM,<br>AT <span class="accent">WORK.</span></h2></div>\n</div>\n<div class="bts-gallery" id="btsGallery">\n'+tiles()+'</div>\n</section>\n\n';
async function run(){
 for(var i=1;i<=8;i++){await put('images/team/shot-'+i+'.svg',PH,'Add team photo placeholder '+i);}
 var r=await gh('contents/index.html?ref='+BRANCH+'&t='+Date.now());var j=await r.json();var sha=j.sha;var html=ub64(j.content);
 if(html.indexOf('bts-gallery')<0){
   if(html.indexOf('.press-track')>-1){html=html.replace('</style>',GCSS+'</style>');}
   html=html.replace('<!-- WORK -->',SECTION+'<!-- WORK -->');
 } else {log('gallery already present');}
 for(var a=0;a<3;a++){var pr=await gh('contents/index.html',{method:'PUT',body:JSON.stringify({message:'Behind-the-scenes sliding gallery',content:b64u(html),branch:BRANCH,sha:sha})});if(pr.ok){log('OK index.html');return;}if(pr.status===409&&a<2){var g=await gh('contents/index.html?ref='+BRANCH+'&t='+Date.now());var gj=await g.json();sha=gj.sha;continue;}throw new Error('index '+pr.status);}
}
document.getElementById('go').onclick=async function(){this.disabled=true;try{if(!tok()){log('no token');return;}await run();log('Done.');}catch(e){log('ERROR '+e.message);}};
